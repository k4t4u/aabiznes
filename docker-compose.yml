version: "3.9"

services:
  api:
    build:
      context: ./Zadanie1Backend
      dockerfile: Dockerfile
    container_name: zadanie1-api
    ports:
      - "5154:8080"
    volumes:
      - api_logs:/app/logs
    depends_on:
      - loki

  loki:
    image: grafana/loki:latest
    container_name: zadanie1-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  alloy:
    image: grafana/alloy:latest
    container_name: zadanie1-alloy
    command: run /etc/alloy/config.alloy --server.http.listen-addr=0.0.0.0:12345
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy
      - api_logs:/var/log/api:ro
    depends_on:
      - loki
      - api

  grafana:
    image: grafana/grafana:latest
    container_name: zadanie1-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - loki

volumes:
  api_logs: